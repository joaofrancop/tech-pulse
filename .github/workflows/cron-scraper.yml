name: Trigger Tech Pulse Scraper

on:
  schedule:
    # Roda automaticamente a cada hora
    - cron: '0 * * * *'
  # Permite que você clique em um botão "Run workflow" para testar manualmente
  workflow_dispatch: 

jobs:
  enviar-tarefas:
    runs-on: ubuntu-latest
    steps:
      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Instalar biblioteca de mensageria
        run: pip install pika

      - name: Enviar URLs para a Fila (RabbitMQ)
        env:
          RABBITMQ_URL: ${{ secrets.RABBITMQ_URL }}
        run: |
          python -c "
          import pika, os, json

          # Conecta no CloudAMQP usando o seu segredo
          url = os.environ.get('RABBITMQ_URL')
          params = pika.URLParameters(url)
          connection = pika.BlockingConnection(params)
          channel = connection.channel()

          # Garante que a fila chamada 'scraping_tasks' exista
          channel.queue_declare(queue='scraping_tasks', durable=True)

          # Lista de portais que o sistema vai raspar
          sites = [
              {'url': 'https://g1.globo.com/tecnologia/', 'fonte': 'G1 Tecnologia'},
              {'url': 'https://techcrunch.com/', 'fonte': 'TechCrunch'}
          ]

          # Envia cada site como uma mensagem independente para a fila
          for site in sites:
              mensagem = json.dumps(site)
              channel.basic_publish(
                  exchange='',
                  routing_key='scraping_tasks',
                  body=mensagem,
                  properties=pika.BasicProperties(delivery_mode=2) # Torna a mensagem persistente
              )
              print(f'Tarefa enviada para a fila: {mensagem}')

          connection.close()
          "
